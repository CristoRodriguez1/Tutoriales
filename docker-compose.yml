services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tienda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django + Gunicorn: sin puertos hacia el host (solo red interna Docker).
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_ALLOWED_HOSTS=*
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-BANCO}

  # Única entrada HTTP pública (puerto 80) — tutorial 5.
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:
