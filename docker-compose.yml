services:
  # Servicio de Base de Datos (PostgreSQL)
  db:
    image: postgres:15
    volumes:
      # Persistencia: Esto asegura que los datos sobrevivan si apagas el contenedor
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tienda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servicio de tu API Django
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Hot-Reload: Mapeamos la carpeta actual para que los cambios de código se reflejen sin reiniciar
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_ALLOWED_HOSTS=*
      # Opcional: MOCK en local; en AWS quitar o poner BANCO y revisar el log de pagos
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-BANCO}

# Definición del volumen persistente
volumes:
  postgres_data: